apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: secure-task-manager
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://github.com/mahmoudrizk398-ai/test-backend.git'
    targetRevision: HEAD
    path: helm/secure-task-manager
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
